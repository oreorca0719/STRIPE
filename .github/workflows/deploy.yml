name: CI/CD — test & deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stripe
          POSTGRES_PASSWORD: stripe
          POSTGRES_DB: stripe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stripe"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Unit tests
        working-directory: backend
        run: python -m pytest tests/ -q
      # 파일명을 고정하지 않는다 — 새 통합 테스트를 추가할 때마다 워크플로를 고쳐야 했고,
      # 그래서 STRIPE_IT 게이트를 건 테스트가 CI에서 누락되기 쉬웠다.
      - name: Integration test (real Postgres)
        working-directory: backend
        env:
          STRIPE_IT: '1'
          DATABASE_URL: postgresql+asyncpg://stripe:stripe@localhost:5432/stripe
        run: |
          python -m alembic upgrade head
          python -m pytest tests/ -q

  # 프론트 빌드는 EC2에서 수행되므로, 배포 전에 CI에서 먼저 검증한다
  # (빌드 오류가 배포 단계에서야 터지는 것을 방지)
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build

  deploy:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (git pull + compose up --build)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/stripe
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
